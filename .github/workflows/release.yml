name: Release Wails App

on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            name: ClaudeProxyPro-Mac.app.zip
          - os: windows-latest
            platform: windows/amd64
            name: ClaudeProxyPro-Windows.exe
          - os: ubuntu-latest
            platform: linux/amd64
            name: ClaudeProxyPro-Linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build App
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Zip Mac App (macOS only)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../${{ matrix.name }} claude-proxy-pro.app

      - name: Copy Binary (Windows/Linux)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/claude-proxy-pro.exe ${{ matrix.name }}
          else
            cp build/bin/claude-proxy-pro ${{ matrix.name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
